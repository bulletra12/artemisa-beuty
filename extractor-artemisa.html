<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Extractor de Productos — Artemisa Beauty</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f7f4f2;color:#1a1a1a;padding:24px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:4px}
p.sub{font-size:13px;color:#666;margin-bottom:24px}
.card{background:#fff;border:1px solid #ede8e4;border-radius:10px;padding:20px;margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:6px}
input,select,textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
input:focus,textarea:focus{border-color:#b5516a}
textarea{resize:vertical;min-height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:inline-block;padding:11px 20px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.btn-primary{background:#1a1a1a;color:#fff;width:100%}
.btn-primary:hover{background:#b5516a}
.btn-rose{background:#b5516a;color:#fff}
.btn-rose:hover{background:#8a3a50}
.btn:disabled{opacity:.6;cursor:default}
.status{padding:10px 14px;border-radius:7px;font-size:13px;margin-top:12px;display:none}
.ok{background:#eafbf0;color:#276749}
.err{background:#fff0f0;color:#e53e3e}
.info{background:#eef3fe;color:#2b6cb0}
.prod-preview{display:none;margin-top:16px}
.prod-card{border:1px solid #ede8e4;border-radius:10px;overflow:hidden}
.prod-img{width:100%;height:200px;object-fit:cover;background:#f7f4f2;display:block}
.prod-body{padding:16px}
.llave-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:12px}
.llave-row input{margin-bottom:0;flex:1}
.llave-row .btn{padding:9px 14px;font-size:12px;white-space:nowrap}
</style>
</head>
<body>

<h1>🌸 Extractor de Productos — Artemisa Beauty</h1>
<p class="sub">Pega el link de un producto del proveedor, extrae la info con IA y envíala al Sheet y Firebase.</p>



<div class="card">
  <label>Link del producto del proveedor</label>
  <input id="url" placeholder="https://www.origenbotanico.com/products/...">
  <div class="row">
    <div>
      <label>Categoría</label>
      <select id="cat">
        <option value="Cabello">Cabello</option>
        <option value="Skincare">Skincare</option>
        <option value="Maquillaje">Maquillaje</option>
        <option value="Corporal">Corporal</option>
      </select>
    </div>
    <div>
      <label>Margen %</label>
      <input type="number" id="margen" value="40" min="0" max="300">
    </div>
  </div>
  <button class="btn btn-primary" id="btn-extraer" onclick="extraer()">🤖 Extraer con IA</button>
  <div class="status" id="status-extraer"></div>
</div>

<div class="prod-preview card" id="preview">
  <label>Vista previa — edita antes de subir</label>
  <div class="prod-card">
    <img id="prev-img" class="prod-img" src="" alt="Foto del producto">
    <div class="prod-body">
      <div><label>Nombre</label><input id="prev-nom" placeholder="Nombre del producto"></div>
      <div><label>Descripción</label><textarea id="prev-desc"></textarea></div>
      <div class="row">
        <div><label>Precio venta (COP)</label><input type="number" id="prev-precio"></div>
        <div><label>Precio proveedor (COP)</label><input type="number" id="prev-old"></div>
      </div>
      <div><label>URL de la foto</label><input id="prev-foto" oninput="actualizarFoto(this.value)"></div>
      <button class="btn btn-rose" id="btn-subir" onclick="subir()" style="width:100%;margin-top:4px">⬆️ Subir a Sheet y Firebase</button>
      <div class="status" id="status-subir"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyAhIgmilAz_pAbfEZE2-0pbWYpRIxsgJWk",
  authDomain:"artemisa-beauty.firebaseapp.com",
  projectId:"artemisa-beauty",
  storageBucket:"artemisa-beauty.firebasestorage.app",
  messagingSenderId:"596884326781",
  appId:"1:596884326781:web:4238d59b755e9903dce414"
});
const db = getFirestore(app);
window._db = db;
window._setDoc = setDoc;
window._doc = doc;

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzAqFU6wgs8tm0LvHh9R9wely5XwMYftMzOtue-W7TGl39-JNyN2Tn4rPQt0kNPyirXBQ/exec';

function getKey() { return document.getElementById('api-key').value.trim() || localStorage.getItem('artemisa_key') || ''; }

window.guardarLlave = function() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) return;
  localStorage.setItem('artemisa_key', k);
  alert('Llave guardada ✓');
};

window.actualizarFoto = function(url) {
  document.getElementById('prev-img').src = url;
};

function setStatus(id, msg, tipo) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.textContent = msg;
  el.className = 'status ' + tipo;
}

window.extraer = async function() {
  const url = document.getElementById('url').value.trim();
  const key = getKey();
  if (!url.startsWith('http')) { setStatus('status-extraer','Ingresa un link válido','err'); return; }
  if (!key) { setStatus('status-extraer','Primero ingresa tu llave de Anthropic arriba','err'); return; }
  const cat = document.getElementById('cat').value;
  const margen = parseFloat(document.getElementById('margen').value) || 40;
  const btn = document.getElementById('btn-extraer');
  btn.disabled = true; btn.textContent = 'Analizando...';
  setStatus('status-extraer','Analizando el link con IA...','info');
  try {
    const res = await fetch('/api/generar-descripcion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        messages: [{
          role: 'user',
          content: `Analiza este link de producto de belleza: ${url}\n\nExtrae la info y responde SOLO en JSON sin backticks:\n{"nombre":"...","descripcion":"descripción 2-3 frases atractiva para Artemisa Beauty Colombia","precio_proveedor":50000,"foto":"URL directa de la imagen del producto o vacío si no encuentras"}`
        }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const texto = data.content?.[0]?.text || '{}';
    const clean = texto.replace(/```json|```/g,'').trim();
    const prod = JSON.parse(clean);
    const precio = Math.round((prod.precio_proveedor || 50000) * (1 + margen/100));
    document.getElementById('prev-nom').value = prod.nombre || '';
    document.getElementById('prev-desc').value = prod.descripcion || '';
    document.getElementById('prev-precio').value = precio;
    document.getElementById('prev-old').value = prod.precio_proveedor || 50000;
    document.getElementById('prev-foto').value = prod.foto || '';
    if (prod.foto) document.getElementById('prev-img').src = prod.foto;
    document.getElementById('preview').style.display = 'block';
    setStatus('status-extraer','Info extraída. Revisa y ajusta antes de subir.','ok');
  } catch(e) {
    setStatus('status-extraer','Error: ' + e.message,'err');
  }
  btn.disabled = false; btn.textContent = '🤖 Extraer con IA';
};

window.subir = async function() {
  const nombre = document.getElementById('prev-nom').value.trim();
  if (!nombre) { setStatus('status-subir','El nombre no puede estar vacío','err'); return; }
  const btn = document.getElementById('btn-subir');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  setStatus('status-subir','Subiendo a Firebase y Sheet...','info');
  const prod = {
    id: Date.now(),
    name: nombre,
    desc: document.getElementById('prev-desc').value.trim(),
    price: parseInt(document.getElementById('prev-precio').value) || 0,
    oldPrice: parseInt(document.getElementById('prev-old').value) || null,
    cat: document.getElementById('cat').value,
    img: document.getElementById('prev-foto').value.trim() || null,
    emoji: '🧴', badge: null, stars: '★★★★★'
  };
  try {
    await window._setDoc(window._doc(window._db, 'productos', String(prod.id)), prod);
    const sheetUrl = `${SHEET_URL}?accion=addCatalogo&id=${prod.id}&nombre=${encodeURIComponent(prod.name)}&descripcion=${encodeURIComponent(prod.desc)}&precio=${prod.price}&categoria=${prod.cat}&foto=${encodeURIComponent(prod.img||'')}&badge=&estrellas=${encodeURIComponent(prod.stars)}`;
    await new Promise(r => { const img = new Image(); img.onload = img.onerror = r; img.src = sheetUrl; setTimeout(r,5000); });
    setStatus('status-subir','✓ Producto subido a Firebase y al Sheet. Recarga tu tienda para verlo.','ok');
    document.getElementById('url').value = '';
    document.getElementById('preview').style.display = 'none';
  } catch(e) {
    setStatus('status-subir','Error: ' + e.message,'err');
  }
  btn.disabled = false; btn.textContent = '⬆️ Subir a Sheet y Firebase';
};

const savedKey = localStorage.getItem('artemisa_key');
if (savedKey) document.getElementById('api-key').value = savedKey;
</script>
</body>
</html>
